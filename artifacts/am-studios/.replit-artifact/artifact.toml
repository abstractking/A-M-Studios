kind = "web"
previewPath = "/"
title = "A&M Studios"
version = "1.0.0"
id = "artifacts/am-studios"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22203

[services.development]
run = "pnpm --filter @workspace/am-studios run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/am-studios", "run", "build" ]
publicDir = "artifacts/am-studios/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22203"
BASE_PATH = "/"
